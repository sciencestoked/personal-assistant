<!DOCTYPE html>
<html>
<head>
    <title>Personal Assistant - Chat</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --text-primary: #c9d1d9;
            --text-secondary: #8b949e;
            --accent-primary: #58a6ff;
            --accent-hover: #1f6feb;
            --border-color: #30363d;
            --success: #3fb950;
            --warning: #d29922;
            --error: #f85149;
            --user-msg-bg: #1c2128;
            --assistant-msg-bg: #0d1117;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background-color: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 1.5em;
            color: var(--text-primary);
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            background-color: var(--accent-primary);
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background-color: var(--accent-hover);
        }

        .btn-secondary {
            background-color: var(--bg-tertiary);
            border: 1px solid var(--border-color);
        }

        .btn-danger {
            background-color: var(--error);
        }

        .container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border-color);
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            display: flex;
            gap: 12px;
            max-width: 80%;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message.assistant {
            align-self: flex-start;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .message.user .message-avatar {
            background-color: var(--accent-primary);
        }

        .message.assistant .message-avatar {
            background-color: var(--success);
        }

        .message-content {
            background-color: var(--bg-tertiary);
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            white-space: pre-wrap;
            line-height: 1.6;
        }

        .message.user .message-content {
            background-color: var(--accent-primary);
            color: white;
        }

        .input-area {
            padding: 20px;
            background-color: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
        }

        .input-container {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        #messageInput {
            flex: 1;
            background-color: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px 16px;
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
            resize: none;
            min-height: 44px;
            max-height: 200px;
        }

        #messageInput:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.1);
        }

        .sidebar {
            width: 300px;
            background-color: var(--bg-secondary);
            border-left: 1px solid var(--border-color);
            overflow-y: auto;
            padding: 20px;
        }

        .sidebar h2 {
            font-size: 1.2em;
            margin-bottom: 15px;
            color: var(--text-primary);
        }

        .action-log {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .action-item {
            background-color: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 10px;
            font-size: 12px;
        }

        .action-item .timestamp {
            color: var(--text-secondary);
            font-size: 11px;
        }

        .action-item .status {
            display: inline-block;
            margin-right: 5px;
        }

        .action-item.success .status { color: var(--success); }
        .action-item.error .status { color: var(--error); }
        .action-item.in_progress .status { color: var(--warning); }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }

        .empty-state h2 {
            margin-bottom: 10px;
            color: var(--text-primary);
        }

        .loading {
            display: flex;
            gap: 5px;
            padding: 10px;
        }

        .loading-dot {
            width: 8px;
            height: 8px;
            background-color: var(--text-secondary);
            border-radius: 50%;
            animation: pulse 1.4s ease-in-out infinite;
        }

        .loading-dot:nth-child(2) { animation-delay: 0.2s; }
        .loading-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes pulse {
            0%, 80%, 100% { opacity: 0.4; }
            40% { opacity: 1; }
        }

        .messages::-webkit-scrollbar,
        .sidebar::-webkit-scrollbar {
            width: 8px;
        }

        .messages::-webkit-scrollbar-track,
        .sidebar::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        .messages::-webkit-scrollbar-thumb,
        .sidebar::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        .messages::-webkit-scrollbar-thumb:hover,
        .sidebar::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🤖 Personal Assistant</h1>
        <div class="header-actions">
            <button class="btn btn-secondary" onclick="window.location.href='/'">Dashboard</button>
            <button class="btn btn-danger" onclick="resetConversation()">Clear Chat</button>
        </div>
    </div>

    <div class="container">
        <div class="chat-area">
            <div class="messages" id="messages">
                <div class="empty-state">
                    <h2>👋 Welcome!</h2>
                    <p>Start a conversation with your personal assistant</p>
                </div>
            </div>

            <div class="input-area">
                <div class="input-container">
                    <textarea
                        id="messageInput"
                        placeholder="Ask me anything..."
                        rows="1"
                        onkeydown="handleKeyPress(event)"
                    ></textarea>
                    <button class="btn" onclick="sendMessage()">Send</button>
                </div>
            </div>
        </div>

        <div class="sidebar">
            <h2>📊 Action Log</h2>
            <div class="action-log" id="actionLog">
                <div class="empty-state">
                    <p>No actions yet</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let isLoading = false;

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();

            if (!message || isLoading) return;

            // Add user message to chat
            addMessage('user', message);
            input.value = '';
            input.style.height = 'auto';

            // Show loading indicator
            isLoading = true;
            const loadingId = addLoadingMessage();
            startPolling(); // Start polling while waiting for response

            try {
                // Send to API
                const response = await fetch('/api/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        question: message,
                        include_context: true
                    })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || 'Failed to get response');
                }

                const data = await response.json();

                // Remove loading and add response
                removeMessage(loadingId);
                addMessage('assistant', data.answer);

                // Update action log
                await updateActionLog();

            } catch (error) {
                removeMessage(loadingId);
                addMessage('assistant', `❌ Error: ${error.message}`);
            } finally {
                isLoading = false;
                stopPolling(); // Stop polling after response
                updateActionLog(); // One final update
            }
        }

        function addMessage(role, content) {
            const messages = document.getElementById('messages');
            const emptyState = messages.querySelector('.empty-state');
            if (emptyState) emptyState.remove();

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            messageDiv.id = `msg-${Date.now()}`;

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = role === 'user' ? '👤' : '🤖';

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = content;

            messageDiv.appendChild(avatar);
            messageDiv.appendChild(contentDiv);
            messages.appendChild(messageDiv);

            messages.scrollTop = messages.scrollHeight;
            return messageDiv.id;
        }

        function addLoadingMessage() {
            const messages = document.getElementById('messages');
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message assistant';
            const id = `loading-${Date.now()}`;
            loadingDiv.id = id;

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = '🤖';

            const loading = document.createElement('div');
            loading.className = 'message-content loading';
            loading.innerHTML = '<div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div>';

            loadingDiv.appendChild(avatar);
            loadingDiv.appendChild(loading);
            messages.appendChild(loadingDiv);

            messages.scrollTop = messages.scrollHeight;
            return id;
        }

        function removeMessage(id) {
            const msg = document.getElementById(id);
            if (msg) msg.remove();
        }

        async function updateActionLog() {
            try {
                const response = await fetch('/api/actions');
                const data = await response.json();

                const actionLog = document.getElementById('actionLog');
                actionLog.innerHTML = '';

                if (data.actions.length === 0) {
                    actionLog.innerHTML = '<div class="empty-state"><p>No actions yet</p></div>';
                    return;
                }

                data.actions.reverse().forEach(action => {
                    const item = document.createElement('div');
                    item.className = `action-item ${action.status}`;

                    const statusIcon = action.status === 'success' ? '✅' :
                                     action.status === 'error' ? '❌' : '⏳';

                    item.innerHTML = `
                        <div class="status">${statusIcon}</div>
                        <strong>${action.action}</strong>
                        <div>${action.details}</div>
                        <div class="timestamp">${new Date(action.timestamp).toLocaleTimeString()}</div>
                    `;

                    actionLog.appendChild(item);
                });
            } catch (error) {
                console.error('Failed to update action log:', error);
            }
        }

        async function resetConversation() {
            if (!confirm('Clear conversation history?')) return;

            try {
                await fetch('/api/session/reset', { method: 'POST' });
                document.getElementById('messages').innerHTML = `
                    <div class="empty-state">
                        <h2>👋 Welcome!</h2>
                        <p>Start a conversation with your personal assistant</p>
                    </div>
                `;
                document.getElementById('actionLog').innerHTML = '<div class="empty-state"><p>No actions yet</p></div>';
            } catch (error) {
                alert('Failed to reset conversation');
            }
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        // Auto-resize textarea
        document.getElementById('messageInput').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        // Load action log on page load
        updateActionLog();

        // Refresh action log only during active conversations (every 2 seconds when waiting for response)
        let pollInterval = null;

        function startPolling() {
            if (!pollInterval) {
                pollInterval = setInterval(updateActionLog, 2000);
            }
        }

        function stopPolling() {
            if (pollInterval) {
                clearInterval(pollInterval);
                pollInterval = null;
            }
        }
    </script>
</body>
</html>
